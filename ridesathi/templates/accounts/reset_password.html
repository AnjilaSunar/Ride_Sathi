{% extends 'accounts/base.html' %}
{% load static %}
{% block title %}Enter OTP | RideSathi{% endblock %}

{% block content %}
<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center; background-color: #f7f9fc;">
    <div style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 100%; max-width: 400px;">
        
        <h2 style="font-size: 24px; font-weight: 800; color: #111; margin-bottom: 10px; text-align: center;">Enter OTP</h2>
        <p style="color: #666; text-align: center; font-size: 14px; margin-bottom: 30px;">
            Please enter the 6-digit OTP assigned to <strong>{{ request.session.reset_email }}</strong> to reset your password.
        </p>

        <form action="{% url 'reset_password' %}" method="POST">
            {% csrf_token %}
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 13px; font-weight: 700; color: #444; margin-bottom: 8px;">6-Digit OTP</label>
                <input type="text" name="otp" required maxlength="6"
                       style="width: 100%; padding: 12px 15px; border: 1px solid #dee2e6; border-radius: 8px; font-size: 14px; outline: none; background: #fafafa; letter-spacing: 2px; text-align: center; font-weight: 600;">
            </div>

            <div style="margin-bottom: 25px;">
                <label style="display: block; font-size: 13px; font-weight: 700; color: #444; margin-bottom: 8px;">New Password</label>
                <input type="password" name="new_password" required minlength="6"
                       style="width: 100%; padding: 12px 15px; border: 1px solid #dee2e6; border-radius: 8px; font-size: 14px; outline: none; background: #fafafa;">
            </div>

            <button type="submit" style="width: 100%; padding: 14px; background: #e42222; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.3s;">
                Confirm & Reset Password
            </button>
        </form>

        <div style="text-align: center; margin-top: 20px;">
            <a href="{% url 'forgot_password' %}" style="color: #666; font-size: 14px; font-weight: 500; text-decoration: none;">Resend OTP</a>
        </div>
    </div>
</div>
{% endblock %}
