{% extends 'accounts/base.html' %}
{% load static %}
{% block title %}Register | RideSathi{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card" style="max-width: 550px;">
        <h2 class="h3 mb-2">Join RideSathi</h2>
        <p class="text-muted mb-4">Create your account to start your adventure.</p>

        <form method="POST" onsubmit="return validatePasswords();">
            {% csrf_token %}

            <div class="row g-3 mb-4">
                <div class="col-12">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
                </div>

                <div class="col-12">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Password</label>
                    <input type="password" id="password1" name="password1" class="form-control" placeholder="Create password" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" id="password2" name="password2" class="form-control" placeholder="Repeat password" required>
                </div>
            </div>

            <button type="submit" class="btn-solid-red w-100 py-3 mb-4">Create Account</button>

            <div class="text-center small fw-bold">
                Already have an account? <a href="{% url 'login' %}" class="text-red text-decoration-none">Sign In</a>
            </div>
        </form>
    </div>
</div>

<script>
    function validatePasswords() {
        const p1 = document.getElementById("password1");
        const p2 = document.getElementById("password2");
        if (p1.value !== p2.value) {
            p2.setCustomValidity("Passwords do not match");
            p2.reportValidity();
            return false;
        } else {
            p2.setCustomValidity("");
            return true;
        }
    }
</script>
{% endblock %}
