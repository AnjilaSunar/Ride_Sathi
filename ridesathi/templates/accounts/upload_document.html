{% extends 'accounts/base.html' %}
{% load static %}
{% block title %}Upload Document | RideSathi{% endblock %}

{% block content %}
<div class="auth-wrapper" style="background-color: var(--bg-alt); min-height: 80vh;">
    <div class="auth-card" style="max-width: 550px;">
        <h2 class="h3 mb-2">Verify Identity</h2>
        <p class="text-muted mb-4">Before you can rent a bike, we need to verify your driving credentials.</p>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted text-uppercase">Document Type</label>
                <select name="doc_type" class="form-select py-3" required style="border-radius: 12px; border: 1.5px solid var(--border-color);">
                    <option value="" disabled selected>Select an option</option>
                    <option value="driving_license">Driving License</option>
                    <option value="citizenship">Citizenship Card</option>
                    <option value="passport">Passport</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold text-muted text-uppercase">Choose File (Image or PDF)</label>
                <input type="file" name="document" class="form-control" accept=".jpg, .jpeg, .png, .pdf" required>
            </div>

            <button type="submit" class="btn-solid-red w-100 py-3 fw-bold">Upload Verification Documents</button>
        </form>
    </div>
</div>
{% endblock %}
