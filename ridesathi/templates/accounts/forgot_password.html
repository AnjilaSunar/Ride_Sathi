{% extends 'accounts/base.html' %}
{% load static %}
{% block title %}Forgot Password | RideSathi{% endblock %}

{% block content %}
<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center; background-color: #f7f9fc;">
    <div style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 100%; max-width: 400px;">
        
        <h2 style="font-size: 24px; font-weight: 800; color: #111; margin-bottom: 10px; text-align: center;">Reset Password</h2>
        <p style="color: #666; text-align: center; font-size: 14px; margin-bottom: 30px;">
            Enter your registered email address to receive a secure OTP code.
        </p>

        <form action="{% url 'forgot_password' %}" method="POST">
            {% csrf_token %}
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 13px; font-weight: 700; color: #444; margin-bottom: 8px;">Email Address</label>
                <input type="email" name="email" required 
                       style="width: 100%; padding: 12px 15px; border: 1px solid #dee2e6; border-radius: 8px; font-size: 14px; outline: none; background: #fafafa;">
            </div>

            <button type="submit" style="width: 100%; padding: 14px; background: #111; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.3s;">
                Send Reset Code
            </button>
        </form>

        <div style="text-align: center; margin-top: 20px;">
            <a href="{% url 'login' %}" style="color: #e42222; font-size: 14px; font-weight: 600; text-decoration: none;">&larr; Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
