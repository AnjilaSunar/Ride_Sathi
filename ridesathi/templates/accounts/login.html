{% extends 'accounts/base.html' %}
{% load static %}
{% block title %}Login | RideSathi{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2 class="h3 mb-2">Welcome Back</h2>
        <p class="text-muted mb-4">Login to manage your premium rides.</p>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-solid-red w-100 py-3 mb-4">Sign In</button>
        </form>

        <div class="text-center small fw-bold">
            Don’t have an account? <a href="{% url 'register' %}" class="text-red text-decoration-none">Create Account</a>
        </div>
    </div>
</div>
{% endblock %}
